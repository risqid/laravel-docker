name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Retag CI image as release
        run: |
          docker pull ghcr.io/risqid/laravel-docker:${{ github.sha }}

          docker tag \
            ghcr.io/risqid/laravel-docker:${{ github.sha }} \
            ghcr.io/risqid/laravel-docker:${{ github.ref_name }}

          docker push ghcr.io/risqid/laravel-docker:${{ github.ref_name }}

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}

          script: |
            cd /opt/laravel-docker

            sed -i "s/^APP_VERSION=.*/APP_VERSION=${{ github.ref_name }}/" .env

            docker compose -f docker-compose.prod.yml pull

            docker compose -f docker-compose.prod.yml up -d

            docker compose -f docker-compose.prod.yml restart nginx

            docker compose -f docker-compose.prod.yml exec -T app php artisan migrate --force

            docker compose -f docker-compose.prod.yml exec -T app php artisan optimize