; Laravel-friendly PHP settings
memory_limit = 256M
upload_max_filesize = 64M
post_max_size = 64M
max_execution_time = 120
max_input_time = 120

display_errors = Off
log_errors = On

date.timezone = UTC

; Session handling note: Laravel is configured to use Redis for sessions
; (see .env SESSION_DRIVER=redis), so PHP's native session.save_path is unused.
