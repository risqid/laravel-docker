; Overrides the default www.conf shipped in php:8.4-fpm-alpine, which
; references a "www-data" user/group that doesn't match the custom "www"
; user (uid 1000) created in the Dockerfile. Without this, the FPM master
; (running as root) wouldn't know the correct user to drop worker
; processes to, or would reference a mismatched/nonexistent user.

[www]
user = www
group = www

listen = 0.0.0.0:9000

pm = dynamic
pm.max_children = 10
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 4

; By default FPM clears most environment variables before passing them
; to PHP, which would silently break Laravel's getenv()-based config
; reading from docker-compose's `env_file: .env`. clear_env=no preserves
; them.
clear_env = no

catch_workers_output = yes
decorate_workers_output = no