; OPcache settings tuned for Laravel production use.
; OPcache caches compiled PHP bytecode in shared memory, avoiding
; recompilation of PHP files on every request — significant perf win.

opcache.enable=1
opcache.enable_cli=0
opcache.memory_consumption=192
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=20000
opcache.validate_timestamps=0
opcache.save_comments=1
opcache.fast_shutdown=1

; validate_timestamps=0 means OPcache will NOT check if files changed
; on disk. This is correct for production (immutable deploys), but if
; you ever run this same image with live-mounted code for debugging,
; set this to 1 temporarily or you'll be confused why edits don't show.
